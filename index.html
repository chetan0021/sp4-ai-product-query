<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SP4 AI Product Assistant</title>
  <meta name="description" content="Official AI Assistant for SP4 Ameya product portfolio." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Montserrat:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <style>
    :root {
      --sp4-purple: #21193D;
      --sp4-orange: #E0724F;
      --sp4-maroon: #9B2C2C;
      --bg-white: #FFFFFF;
      --bg-gray: #F4F4F4;
      --text-main: #1A202C;
      --text-muted: #718096;
      --border-light: #E2E8F0;
      --radius-pill: 50px;
      --radius-md: 12px;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg-white);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 1200px;
      margin: 0 auto;
      border-left: 1px solid var(--border-light);
      border-right: 1px solid var(--border-light);
    }

    /* HEADER */
    header {
      padding: 24px 40px;
      border-bottom: 2px solid var(--bg-gray);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      font-size: 28px;
    }

    .brand-title {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--sp4-purple);
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-radius: var(--radius-pill);
      background: var(--bg-gray);
      font-size: 13px;
      color: var(--sp4-purple);
      font-weight: 600;
      border: 1px solid var(--border-light);
    }

    /* CONTENT LAYOUT */
    .content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* SIDEBAR */
    aside {
      width: 280px;
      background: var(--bg-gray);
      display: flex;
      flex-direction: column;
      padding: 30px 20px;
      gap: 20px;
      overflow-y: auto;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--sp4-purple);
      margin-bottom: 15px;
    }

    .product-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .product-item {
      padding: 12px;
      background: white;
      border-radius: var(--radius-md);
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s;
    }

    .product-item:hover {
      border-color: var(--sp4-orange);
      box-shadow: var(--shadow);
    }

    .product-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .product-cat {
      font-size: 11px;
      color: var(--sp4-orange);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* CHAT MAIN */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    /* WELCOME SCREEN */
    .welcome {
      text-align: center;
      margin: auto;
      max-width: 500px;
    }

    .welcome h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      color: var(--sp4-purple);
      margin-bottom: 15px;
    }

    .welcome p {
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .welcome-chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .chip {
      padding: 8px 18px;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-pill);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .chip:hover {
      background: var(--sp4-purple);
      color: white;
      border-color: var(--sp4-purple);
    }

    /* BUBBLES */
    .msg {
      display: flex;
      gap: 15px;
      max-width: 85%;
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }

    .msg.ai .avatar {
      background: var(--sp4-purple);
      color: white;
    }

    .msg.user .avatar {
      background: var(--bg-gray);
      color: var(--sp4-purple);
    }

    .bubble {
      padding: 16px 20px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      border: 1px solid var(--border-light);
    }

    .msg.ai .bubble {
      background: #fdfdfd;
      border-top-left-radius: 4px;
    }

    .msg.user .bubble {
      background: var(--sp4-purple);
      color: white;
      border-top-right-radius: 4px;
      border-color: var(--sp4-purple);
    }

    .time {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .msg.user .time {
      text-align: right;
    }

    /* INPUT AREA */
    .input-box {
      padding: 30px 40px;
      border-top: 2px solid var(--bg-gray);
    }

    .input-row {
      display: flex;
      gap: 15px;
      align-items: center;
      background: var(--bg-gray);
      padding: 8px 8px 8px 24px;
      border-radius: var(--radius-pill);
    }

    input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 14px;
      color: var(--text-main);
    }

    .send-btn {
      background: #000000;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: var(--radius-pill);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .send-btn:hover {
      background: #333333;
      transform: scale(1.02);
    }

    /* LOADER */
    .typing {
      display: flex;
      gap: 4px;
      padding: 10px 0;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: var(--sp4-purple);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
      opacity: 0.6;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: scale(0);
      }

      40% {
        transform: scale(1.0);
      }
    }

    strong {
      color: var(--sp4-orange);
    }
  </style>
</head>

<body>

  <div class="app">
    <header>
      <div class="logo-area">
        <div class="logo-icon">🧠</div>
        <div class="brand-title">SP4 Ameya</div>
      </div>
      <div class="status-badge">
        <div style="width: 8px; height: 8px; background: #48bb78; border-radius: 50%;"></div>
        Assistant Online
      </div>
    </header>

    <div class="content">
      <aside>
        <div>
          <h2 class="section-title">Products</h2>
          <div id="product-list" class="product-list"></div>
        </div>
      </aside>

      <main>
        <div id="messages">
          <div class="welcome" id="welcome">
            <h1>How can we help?</h1>
            <p>Ask anything about our MedTech solutions — from Vital Step to rehabilitation IoT devices. Our AI guide is
              here to assist.</p>
            <div class="welcome-chips">
              <div class="chip" onclick="quickAsk('Overview of all SP4 products')">📦 Product Catalog</div>
              <div class="chip" onclick="quickAsk('Remote patient monitoring devices')">📡 Remote Monitoring</div>
              <div class="chip" onclick="quickAsk('IoT for stroke rehabilitation')">🏥 Rehabilitation</div>
            </div>
          </div>
        </div>

        <div class="input-box">
          <form onsubmit="handleSend(event)" class="input-row">
            <input type="text" id="user-input" placeholder="Type your query here..." autocomplete="off">
            <button type="submit" class="send-btn" id="send-btn">Send</button>
          </form>
        </div>
      </main>
    </div>
  </div>

  <script>
    let products = [];
    let chatHistory = [];
    let isSending = false;

    async function init() {
      try {
        const res = await fetch('products.json');
        products = await res.json();
        renderSidebar();
      } catch (e) { console.error('Error loading products', e); }
    }

    function renderSidebar() {
      const el = document.getElementById('product-list');
      el.innerHTML = products.map(p => `
      <div class="product-item" onclick="quickAsk('Tell me more about ${p.name}')">
        <div class="product-name">${p.name}</div>
        <div class="product-cat">${p.category[0]}</div>
      </div>
    `).join('');
    }

    function quickAsk(text) {
      document.getElementById('user-input').value = text;
      handleSend({ preventDefault: () => { } });
    }

    function hideWelcome() {
      const w = document.getElementById('welcome');
      if (w) w.style.display = 'none';
    }

    function appendMsg(role, text) {
      const wrap = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      const avatar = role === 'ai' ? '🤖' : '👤';
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div class="body">
        <div class="bubble">${text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>')}</div>
        <div class="time">${time}</div>
      </div>
    `;
      wrap.appendChild(div);
      wrap.scrollTop = wrap.scrollHeight;
    }

    async function handleSend(e) {
      e.preventDefault();
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text || isSending) return;

      hideWelcome();
      input.value = '';
      appendMsg('user', text);
      chatHistory.push({ role: 'user', content: text });

      isSending = true;
      showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [
              { role: 'system', content: `You are the Official AI Assistant for SP4 Ameya. Answer queries about their products: ${JSON.stringify(products)}. Be professional, helpful, and concise.` },
              ...chatHistory.slice(-10)
            ]
          })
        });

        const data = await res.json();
        hideTyping();

        if (data.error) throw new Error(data.error);

        const reply = data.choices[0].message.content;
        appendMsg('ai', reply);
        chatHistory.push({ role: 'assistant', content: reply });

      } catch (err) {
        hideTyping();
        appendMsg('ai', '⚠️ Error: ' + err.message);
      } finally {
        isSending = false;
      }
    }

    let typingDiv = null;
    function showTyping() {
      const wrap = document.getElementById('messages');
      typingDiv = document.createElement('div');
      typingDiv.className = 'msg ai';
      typingDiv.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble">
        <div class="typing">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    `;
      wrap.appendChild(typingDiv);
      wrap.scrollTop = wrap.scrollHeight;
    }

    function hideTyping() {
      if (typingDiv) typingDiv.remove();
    }

    init();
  </script>

</body>

</html>
